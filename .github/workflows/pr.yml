name: pull-request

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.3
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -r apps/api/requirements-dev.txt
      - run: pnpm install --frozen-lockfile
      - run: .venv/bin/python scripts/generate-local-secrets.py
      - run: pnpm api:generate
      - run: pnpm i18n:validate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: .venv/bin/python -m bandit -q -r apps/api/shadowgrid apps/worker
      - run: .venv/bin/python -m pip_audit -r apps/api/requirements.txt --progress-spinner=off
      - run: pnpm audit --audit-level high
